<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Localizador de expedientes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Spectral:wght@500;600;700&family=IBM+Plex+Mono:wght@500;600&family=Inter:wght@400;500;600&display=swap');
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #F2EEE3;
    font-family: 'Inter', sans-serif;
    color: #22201B;
  }
  .font-display { font-family: 'Spectral', serif; }
  .font-mono { font-family: 'IBM Plex Mono', monospace; }
  .wrap { max-width: 640px; margin: 0 auto; padding: 28px 16px 60px; }
  .eyebrow { font-size: 12px; letter-spacing: 2px; color: #8A8272; text-transform: uppercase; }
  h1 { font-size: 30px; font-weight: 700; margin: 4px 0 24px; }
  form.search { display: flex; gap: 8px; margin-bottom: 16px; }
  input[type=text], input[type=search] {
    flex: 1; padding: 14px 16px; font-size: 16px; border-radius: 10px;
    border: 1px solid #D8D2C2; background: #FFFDF7; color: #22201B;
  }
  button {
    cursor: pointer; border: none; border-radius: 10px; font-weight: 600;
  }
  .btn-primary { padding: 14px 20px; background: #1F2A38; color: #F2EEE3; font-size: 15px; }
  .btn-link { background: none; color: #1F5B73; padding: 0; font-size: 14px; }
  .btn-link.danger { color: #A63A34; }
  .card { background: #FFFDF7; border-radius: 10px; padding: 16px; margin-bottom: 20px; }
  .result-notfound { border: 1px solid #E3A99C; }
  .result-found { display: flex; align-items: center; gap: 12px; }
  .swatch { width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0; }
  .shelf {
    display: flex; align-items: center; gap: 12px; background: #FFFDF7;
    border: 1px solid #E3DDCC; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px;
    transition: opacity 0.2s ease;
  }
  .shelf.active { border: 2px solid #22201B; animation: pulseGlow 1.8s ease-in-out infinite; }
  .shelf.dim { opacity: 0.5; }
  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(0,0,0,0.08); }
    50% { box-shadow: 0 0 0 6px rgba(0,0,0,0.03); }
  }
  @media (prefers-reduced-motion: reduce) { .shelf.active { animation: none; } }
  .shelf-label { font-size: 13px; font-weight: 600; width: 62px; flex-shrink: 0; }
  .chips { display: flex; gap: 5px; flex-wrap: wrap; flex: 1; }
  .chip { color: #fff; border-radius: 6px; padding: 3px 8px; font-size: 12px; font-weight: 600; }
  .empty-shelf { font-size: 13px; color: #B0AA98; }
  .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #E3DDCC; }
  .row .num { font-size: 14px; }
  .row .meta { font-size: 12px; color: #8A8272; }
  .row .info { flex: 1; min-width: 0; }
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(34,32,27,0.5); display: none;
    align-items: flex-end; justify-content: center; z-index: 50;
  }
  .modal-overlay.open { display: flex; }
  .modal { background: #FFFDF7; border-radius: 16px 16px 0 0; padding: 20px; width: 100%; max-width: 640px; }
  .modal h2 { font-size: 20px; font-weight: 600; margin: 0 0 14px; }
  label { display: block; font-size: 13px; color: #5B5647; margin-bottom: 4px; }
  select { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #D8D2C2; margin-bottom: 12px; font-size: 15px; background: #fff; }
  .modal input[type=text] { width: 100%; margin-bottom: 12px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 6px; }
  .modal-actions button { flex: 1; padding: 12px 0; }
  .btn-cancel { border: 1px solid #D8D2C2; background: none; }
  .btn-save { background: #1F2A38; color: #F2EEE3; }
  .notice { color: #A63A34; font-size: 13px; margin-top: 12px; }
  input:focus, button:focus, select:focus { outline: 2px solid #1F2A38; outline-offset: 2px; }

</head>

  <h1 class="font-display">Localizador de expedientes</h1>

    <input type="text" id="searchInput" class="font-mono" placeholder="N° de expediente o apellido" autocomplete="off" />

  <div id="shelvesArea"></div>

  <div class="legend" id="legendArea"></div>

  <div id="listArea"></div>

</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">

    <label>Categoría</label>

    <div class="modal-actions">

async function importPlanilla() {
  const existingNums = new Set(expedientes.map(x => x.numero.trim().toLowerCase()));
  let added = 0, skipped = 0;
  showNotice(`Cargando ${IMPORT_DATA.length} expedientes a la planilla, esto puede tardar un minuto...`);
  for (const item of IMPORT_DATA) {
    const key = item.numero.trim().toLowerCase();
    if (existingNums.has(key)) { skipped++; continue; }
    existingNums.add(key);
    await postToSheet("add", {
      nombre: item.caratula,
      expediente: item.numero,
      estado: CATEGORIA_TO_ESTADO[item.categoria],
    });
    added++;
  }
  await loadData();
  showNotice(`Se cargaron ${added} expedientes a la planilla. ${skipped ? skipped + " ya existían y se omitieron." : ""}`);
}

function categoryOf(id) {
  return CATEGORIES.find(c => c.id === id) || CATEGORIES[0];
}

function loadViaJSONP(url) {
  return new Promise((resolve, reject) => {
    const callbackName = "jsonpCb_" + Date.now() + "_" + Math.floor(Math.random() * 10000);
    const script = document.createElement("script");
    const cleanup = () => { delete window[callbackName]; script.remove(); };
    window[callbackName] = (data) => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error("jsonp error")); };
    script.src = url + (url.includes("?") ? "&" : "?") + "callback=" + callbackName;
    document.body.appendChild(script);
  });
}

async function loadData() {
  try {
    const rows = await loadViaJSONP(APPS_SCRIPT_URL);
    expedientes = rows.map(r => {
      const catId = ESTADO_TO_CATEGORIA[(r.estado || "").trim().toLowerCase()] || "archivado";
      return {
        id: String(r.fila),
        fila: r.fila,
        numero: String(r.expediente || ""),
        caratula: r.nombre || "",
        dni: r.dni || "",
        domicilio: r.domicilio || "",
        responsable: r.responsable || "",
        codigo: r.codigo || "",
        categoria: catId,
        estante: CATEGORIA_TO_ESTANTE[catId] || 1,
      };
    });
  } catch (e) {
    showNotice("No se pudo conectar con la planilla de Google. Revisá tu conexión y volvé a intentar.");
  }
  loaded = true;
  renderAll();
}

async function postToSheet(action, payload) {
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action, ...payload }),
    });
    return true;
  } catch (e) {
    showNotice("No se pudo guardar el cambio en la planilla. Probá de nuevo.");
    return false;
  }
}

function showNotice(msg, isError) {
  const el = document.getElementById("notice");
  el.textContent = msg;
  el.style.color = isError === false ? "#5B5647" : "#A63A34";
  el.style.display = "block";
}

function renderAll() {
  renderResult();
  renderShelves();
  renderLegend();
  renderList();
}

function renderResult() {
  const area = document.getElementById("resultArea");
  area.innerHTML = "";
  if (result === "not-found") {
    const div = document.createElement("div");
    div.className = "card result-notfound";
    div.innerHTML = `<p style="margin:0;">No se encontró ningún expediente para <span class="font-mono">${escapeHtml(currentQuery)}</span>.</p>`;
    const btn = document.createElement("button");
    btn.className = "btn-link";
    btn.style.marginTop = "10px";
    btn.textContent = "+ Cargarlo ahora";
    btn.onclick = () => openForm(null, currentQuery);
    div.appendChild(btn);
    area.appendChild(div);
  } else if (result && result.multiple) {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<p style="margin:0 0 8px; font-size:14px; color:#5B5647;">Hay ${result.multiple.length} expedientes que coinciden con "${escapeHtml(currentQuery)}":</p>`;
    result.multiple.forEach(exp => {
      const cat = categoryOf(exp.categoria);
      const item = document.createElement("div");
      item.style.display = "flex";
      item.style.alignItems = "center";
      item.style.gap = "8px";
      item.style.padding = "8px 0";
      item.style.borderTop = "1px solid #E3DDCC";
      item.style.cursor = "pointer";
      item.innerHTML = `
        <span class="legend-dot" style="background:${cat.color}"></span>
        <div style="flex:1;">
          <div class="font-mono" style="font-size:14px;">${exp.codigo ? escapeHtml(exp.codigo) + " · " : ""}${escapeHtml(exp.numero)}</div>
          <div style="font-size:12px; color:#8A8272;">${escapeHtml(exp.caratula || "")} · Estante ${exp.estante}</div>
        </div>
      `;
      item.onclick = () => selectResult(exp);
      div.appendChild(item);
    });
    area.appendChild(div);
  } else if (result && result !== "not-found") {
    const cat = categoryOf(result.categoria);
    const div = document.createElement("div");
    div.className = "card result-found";
    div.style.border = `1px solid ${cat.color}`;
    div.innerHTML = `
      <span class="swatch" style="background:${cat.color}"></span>
      <div style="flex:1;">
        <div class="font-mono" style="font-weight:600;">${result.codigo ? escapeHtml(result.codigo) + " · " : ""}${escapeHtml(result.numero)} — Estante ${result.estante}</div>
        <div style="font-size:14px; color:#5B5647;">${escapeHtml(cat.name)}${result.caratula ? " · " + escapeHtml(result.caratula) : ""}</div>
      </div>
    `;
    const btn = document.createElement("button");
    btn.className = "btn-link";
    btn.textContent = "Editar";
    btn.onclick = () => openForm(result);
    div.appendChild(btn);
    area.appendChild(div);
  }
}

function renderShelves() {
  const area = document.getElementById("shelvesArea");
  area.innerHTML = "";
  SHELVES.forEach(n => {
    const cats = SHELF_CATEGORIES[n] || [];
    const active = result && result !== "not-found" && !result.multiple && result.estante === n;
    const dim = result && result !== "not-found" && !result.multiple && !active;

    const shelf = document.createElement("div");
    shelf.className = "shelf" + (active ? " active" : "") + (dim ? " dim" : "");
    shelf.style.padding = "8px";

    const label = document.createElement("div");
    label.className = "shelf-label font-mono";
    label.textContent = `Estante ${n}`;
    shelf.appendChild(label);

    const halves = document.createElement("div");
    halves.style.display = "flex";
    halves.style.gap = "4px";
    halves.style.flex = "1";
    halves.style.height = "44px";

    if (cats.length === 0) {
      const empty = document.createElement("div");
      empty.className = "empty-shelf";
      empty.style.display = "flex";
      empty.style.alignItems = "center";
      empty.textContent = "estante libre";
      halves.appendChild(empty);
    } else {
      cats.forEach(catId => {
        const cat = categoryOf(catId);
        const count = expedientes.filter(x => x.estante === n && x.categoria === catId).length;
        const isMatch = active && result.categoria === catId;
        const half = document.createElement("div");
        half.style.flex = "1";
        half.style.background = cat.color;
        half.style.borderRadius = "6px";
        half.style.display = "flex";
        half.style.flexDirection = "column";
        half.style.alignItems = "center";
        half.style.justifyContent = "center";
        half.style.color = "#fff";
        half.style.fontSize = "11px";
        half.style.fontWeight = "600";
        half.style.textAlign = "center";
        half.style.lineHeight = "1.2";
        half.style.padding = "2px 4px";
        half.style.transition = "outline 0.15s ease";
        if (isMatch) {
          half.style.outline = "3px solid #22201B";
          half.style.outlineOffset = "-3px";
        }
        half.innerHTML = `<span>${escapeHtml(cat.name)}</span><span class="font-mono">${count}</span>`;
        halves.appendChild(half);
      });
    }
    shelf.appendChild(halves);
    area.appendChild(shelf);
  });
}

function renderLegend() {
  const area = document.getElementById("legendArea");
  area.innerHTML = "";
  CATEGORIES.forEach(c => {
    const item = document.createElement("div");
    item.className = "legend-item";
    item.innerHTML = `<span class="legend-dot" style="background:${c.color}"></span>${escapeHtml(c.name)}`;
    area.appendChild(item);
  });
}

function renderList() {
  document.getElementById("countLabel").textContent = `Todos los expedientes (${expedientes.length})`;
  document.getElementById("emptyMsg").style.display = (loaded && expedientes.length === 0) ? "block" : "none";
  const area = document.getElementById("listArea");
  area.innerHTML = "";
  const sorted = expedientes.slice().sort((a, b) => a.estante - b.estante);
  sorted.forEach(exp => {
    const cat = categoryOf(exp.categoria);
    const row = document.createElement("div");
    row.className = "row";
    row.innerHTML = `
      <span class="legend-dot" style="background:${cat.color}"></span>
      <div class="info">
        <div class="num font-mono">${exp.codigo ? escapeHtml(exp.codigo) + " · " : ""}${escapeHtml(exp.numero)}</div>
        <div class="meta">Estante ${exp.estante} · ${escapeHtml(cat.name)}</div>
      </div>
    `;
    const editBtn = document.createElement("button");
    editBtn.className = "btn-link";
    editBtn.textContent = "Editar";
    editBtn.onclick = () => openForm(exp);
    const delBtn = document.createElement("button");
    delBtn.className = "btn-link danger";
    delBtn.textContent = "Borrar";
    delBtn.onclick = () => deleteExp(exp.id);
    row.appendChild(editBtn);
    row.appendChild(delBtn);
    area.appendChild(row);
  });
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str == null ? "" : str;
  return div.innerHTML;
}

function openForm(exp, prefillNumero) {
  editingId = exp ? exp.id : null;
  document.getElementById("modalTitle").textContent = exp ? "Editar expediente" : "Nuevo expediente";
  document.getElementById("f_numero").value = exp ? exp.numero : (prefillNumero || "");
  document.getElementById("f_caratula").value = exp ? (exp.caratula || "") : "";
  document.getElementById("f_categoria").value = exp ? exp.categoria : CATEGORIES[0].id;
  document.getElementById("modalOverlay").classList.add("open");
}

function closeForm() {
  document.getElementById("modalOverlay").classList.remove("open");
}

async function deleteExp(id) {
  const exp = expedientes.find(x => x.id === id);
  if (!exp) return;
  await postToSheet("delete", { fila: exp.fila });
  if (result && result !== "not-found" && !result.multiple && result.id === id) result = "not-found";
  await loadData();
}

function init() {
  CATEGORIES.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c.id;
    opt.textContent = c.name;
    document.getElementById("f_categoria").appendChild(opt);
  });

  function doSearch() {
    const q = document.getElementById("searchInput").value.trim();
    currentQuery = q;
    if (!q) return;
    const qLower = q.toLowerCase();
    const exact = expedientes.find(x => x.numero.trim().toLowerCase() === qLower);
    if (exact) {
      result = exact;
      renderAll();
      return;
    }
    const nameMatches = expedientes.filter(x => (x.caratula || "").toLowerCase().includes(qLower));
    if (nameMatches.length === 1) {
      result = nameMatches[0];
    } else if (nameMatches.length > 1) {
      result = { multiple: nameMatches };
    } else {
      result = "not-found";
    }
    renderAll();
  }
  function selectResult(exp) {
    result = exp;
    renderAll();
  }
  window.__selectResult = selectResult;
  document.getElementById("searchBtn").addEventListener("click", doSearch);
  document.getElementById("searchInput").addEventListener("keydown", (e) => {
    if (e.key === "Enter") doSearch();
  });

  document.getElementById("searchInput").addEventListener("input", () => {
    result = null;
    renderResult();
    renderShelves();
  });

  document.getElementById("newBtn").addEventListener("click", () => openForm(null, document.getElementById("searchInput").value.trim()));
  document.getElementById("importBtn").addEventListener("click", () => {
    importPlanilla();
  });
  document.getElementById("cancelBtn").addEventListener("click", closeForm);

  async function saveExpediente() {
    const numero = document.getElementById("f_numero").value.trim();
    if (!numero) return;
    const caratula = document.getElementById("f_caratula").value.trim();
    const categoria = document.getElementById("f_categoria").value;
    const estado = CATEGORIA_TO_ESTADO[categoria];

    if (editingId) {
      const exp = expedientes.find(x => x.id === editingId);
      await postToSheet("update", { fila: exp.fila, nombre: caratula, estado });
    } else {
      await postToSheet("add", { nombre: caratula, expediente: numero, estado });
    }
    closeForm();
    await loadData();
    if (currentQuery) {
      const found = expedientes.find(x => x.numero.trim().toLowerCase() === currentQuery.toLowerCase());
      if (found) { result = found; renderAll(); }
    }
  }
  document.getElementById("saveBtn").addEventListener("click", saveExpediente);

  loadData();
}

init();
</script>
</body>
</html>
